<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lingua</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>
                    <path d="M11 8a3 3 0 0 0-3 3v3"/>
                    <path d="M8 11h6"/>
                </svg>
                <span>Lingua</span>
            </div>
            <nav class="nav">
                <button class="nav-btn active" data-tab="translator">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 8l6 6M19 8l-6 6M12 4v16"/>
                    </svg>
                    Перевод
                </button>
                <button class="nav-btn" data-tab="dictionary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                    Словарь
                </button>
                <button class="nav-btn" data-tab="cards">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                        <line x1="8" y1="21" x2="16" y2="21"/>
                        <line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                    Карточки
                </button>
                <button class="nav-btn" data-tab="grammar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="4 7 12 3 20 7"/>
                        <polyline points="4 12 12 8 20 12"/>
                        <polyline points="4 17 12 13 20 17"/>
                    </svg>
                    Грамматика
                </button>
            </nav>
        </header>

        <main class="main">
            <section id="translatorSection" class="section active">
                <div class="translator-card">
                    <div class="input-section">
                        <div class="language-selector">
                            <span class="lang active" id="sourceLangLabel">Английский</span>
                        </div>
                        <textarea id="sourceText" class="text-input" placeholder="Введите текст для перевода..." rows="5"></textarea>
                        <div class="input-footer">
                            <span class="char-count"><span id="charCount">0</span> / 5000</span>
                            <div class="input-actions">
                                <button id="voiceInputBtn" class="icon-btn" title="Голосовой ввод">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8c8c8c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                                        <line x1="12" y1="19" x2="12" y2="23"/>
                                        <line x1="8" y1="23" x2="16" y2="23"/>
                                    </svg>
                                </button>
                                <button id="clearBtn" class="icon-btn" title="Очистить">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8c8c8c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <line x1="18" y1="6" x2="6" y2="18"/>
                                        <line x1="6" y1="6" x2="18" y2="18"/>
                                    </svg>
                                </button>
                                <button id="copySourceBtn" class="icon-btn" title="Копировать">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8c8c8c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="divider">
                        <button id="swapBtn" class="swap-btn" title="Поменять языки">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="17 1 21 5 17 9"/>
                                <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                                <polyline points="7 23 3 19 7 15"/>
                                <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                            </svg>
                        </button>
                    </div>
                    <div class="output-section">
                        <div class="language-selector">
                            <span class="lang active" id="targetLangLabel">Русский</span>
                        </div>
                        <div id="outputText" class="text-output">
                            <span class="placeholder-text">Перевод появится здесь...</span>
                        </div>
                        <div class="output-footer">
                            <span class="translation-info" id="translationInfo"></span>
                            <div class="output-actions">
                                <button id="speakBtn" class="icon-btn" title="Озвучить">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8c8c8c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
                                    </svg>
                                </button>
                                <button id="copyOutputBtn" class="icon-btn" title="Копировать">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8c8c8c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="dictionarySection" class="section">
                <div class="dictionary-card">
                    <div class="dictionary-search">
                        <div class="search-wrapper">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8c8c8c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"/>
                                <path d="M21 21l-4.35-4.35"/>
                            </svg>
                            <input type="text" id="dictionarySearch" class="search-input" placeholder="Поиск слова на английском...">
                        </div>
                        <div class="search-suggestions" id="searchSuggestions"></div>
                    </div>
                    <div class="dictionary-result" id="dictionaryResult">
                        <div class="dict-placeholder">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#d0ccc4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                            </svg>
                            <p>Введите слово для поиска</p>
                        </div>
                    </div>
                </div>
            </section>

            <section id="cardsSection" class="section">
                <div class="cards-card">
                    <div id="cardsStart" class="cards-start">
                        <div class="cards-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                                <line x1="8" y1="21" x2="16" y2="21"/>
                                <line x1="12" y1="17" x2="12" y2="21"/>
                            </svg>
                        </div>
                        <h2 class="cards-title">Карточки для запоминания</h2>
                        <p class="cards-subtitle">Интервальное повторение слов</p>
                        <div class="cards-selector">
                            <button class="cards-option" data-mode="enru">
                                <span class="cards-option-label">Английский — Русский</span>
                                <span class="cards-option-desc">Видите английское слово, вспоминаете перевод</span>
                            </button>
                            <button class="cards-option" data-mode="ruen">
                                <span class="cards-option-label">Русский — Английский</span>
                                <span class="cards-option-desc">Видите русское слово, вспоминаете перевод</span>
                            </button>
                        </div>
                        <p class="cards-count" id="cardsCount">Доступно слов: 500</p>
                    </div>
                    <div id="cardsActive" class="cards-active" style="display:none;">
                        <div class="card-progress">
                            <div class="progress-bar">
                                <div class="progress-fill" id="cardProgressFill"></div>
                            </div>
                            <span class="progress-text" id="cardProgressText">0 / 0</span>
                        </div>
                        <div class="flashcard" id="flashcard">
                            <div class="flashcard-front" id="flashcardFront"></div>
                            <div class="flashcard-back" id="flashcardBack" style="display:none;"></div>
                            <p class="flip-hint" id="flipHint">Нажмите чтобы перевернуть</p>
                        </div>
                        <div class="difficulty-buttons" id="difficultyButtons" style="display:none;">
                            <button class="diff-btn again" data-diff="0">Сложно</button>
                            <button class="diff-btn hard" data-diff="1">Нормально</button>
                            <button class="diff-btn good" data-diff="2">Легко</button>
                        </div>
                        <button id="quitCardsBtn" class="quit-btn">Завершить</button>
                    </div>
                </div>
            </section>

            <section id="grammarSection" class="section">
                <div class="grammar-card">
                    <div id="grammarMenu" class="grammar-menu">
                        <h2 class="grammar-title">Грамматические упражнения</h2>
                        <div class="grammar-grid">
                            <button class="grammar-exercise-btn" data-exercise="articles">
                                <span class="ge-icon">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="4 7 12 3 20 7"/>
                                        <polyline points="4 12 12 8 20 12"/>
                                        <polyline points="4 17 12 13 20 17"/>
                                    </svg>
                                </span>
                                <span class="ge-label">Артикли a / an / the</span>
                                <span class="ge-count">20 заданий</span>
                            </button>
                            <button class="grammar-exercise-btn" data-exercise="tenses">
                                <span class="ge-icon">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                        <circle cx="12" cy="12" r="10"/>
                                        <polyline points="12 6 12 12 16 14"/>
                                    </svg>
                                </span>
                                <span class="ge-label">Времена глаголов</span>
                                <span class="ge-count">20 заданий</span>
                            </button>
                            <button class="grammar-exercise-btn" data-exercise="prepositions">
                                <span class="ge-icon">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                        <circle cx="12" cy="5" r="2"/>
                                        <path d="M12 7v14"/>
                                        <line x1="8" y1="13" x2="16" y2="13"/>
                                    </svg>
                                </span>
                                <span class="ge-label">Предлоги</span>
                                <span class="ge-count">20 заданий</span>
                            </button>
                            <button class="grammar-exercise-btn" data-exercise="wordorder">
                                <span class="ge-icon">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                        <line x1="4" y1="6" x2="20" y2="6"/>
                                        <line x1="4" y1="12" x2="14" y2="12"/>
                                        <line x1="4" y1="18" x2="8" y2="18"/>
                                    </svg>
                                </span>
                                <span class="ge-label">Порядок слов</span>
                                <span class="ge-count">15 заданий</span>
                            </button>
                        </div>
                    </div>
                    <div id="grammarActive" class="grammar-active" style="display:none;">
                        <div class="grammar-header">
                            <button id="backToGrammarBtn" class="back-btn">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="19" y1="12" x2="5" y2="12"/>
                                    <polyline points="12 19 5 12 12 5"/>
                                </svg>
                                Назад
                            </button>
                            <div class="grammar-progress">
                                <div class="progress-bar">
                                    <div class="progress-fill" id="grammarProgressFill"></div>
                                </div>
                                <span class="progress-text" id="grammarProgressText">1 / 20</span>
                            </div>
                        </div>
                        <div class="grammar-question-block">
                            <p class="grammar-question" id="grammarQuestion"></p>
                            <div class="grammar-options" id="grammarOptions"></div>
                        </div>
                        <button id="grammarNextBtn" class="next-btn" disabled>Далее</button>
                    </div>
                    <div id="grammarResult" class="grammar-result" style="display:none;">
                        <div class="result-icon" id="grammarResultIcon"></div>
                        <h2 id="grammarResultTitle"></h2>
                        <p class="result-score" id="grammarResultScore"></p>
                        <button id="grammarRetryBtn" class="retry-btn">Пройти заново</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
