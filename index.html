<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lingua</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>
    <div class="app-container">
        <div id="authScreen" class="auth-screen">
            <div class="auth-card">
                <div class="auth-logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/><path d="M11 8a3 3 0 0 0-3 3v3"/><path d="M8 11h6"/>
                    </svg>
                    <span>Lingua</span>
                </div>
                <div id="authForms">
                    <div id="loginForm" class="auth-form">
                        <h2>Вход</h2>
                        <input type="text" id="loginUsername" placeholder="Имя пользователя" class="auth-input">
                        <input type="password" id="loginPassword" placeholder="Пароль" class="auth-input">
                        <button id="loginBtn" class="auth-btn">Войти</button>
                        <p class="auth-switch">Нет аккаунта? <span id="showRegister">Зарегистрироваться</span></p>
                        <p id="loginError" class="auth-error"></p>
                    </div>
                    <div id="registerForm" class="auth-form" style="display:none;">
                        <h2>Регистрация</h2>
                        <input type="text" id="regUsername" placeholder="Имя пользователя" class="auth-input">
                        <input type="password" id="regPassword" placeholder="Пароль" class="auth-input">
                        <input type="password" id="regPasswordConfirm" placeholder="Подтвердите пароль" class="auth-input">
                        <button id="registerBtn" class="auth-btn">Зарегистрироваться</button>
                        <p class="auth-switch">Уже есть аккаунт? <span id="showLogin">Войти</span></p>
                        <p id="registerError" class="auth-error"></p>
                    </div>
                </div>
            </div>
        </div>

        <div id="goalScreen" class="goal-screen" style="display:none;">
            <div class="goal-card">
                <h2>Выберите цель обучения</h2>
                <div class="goal-grid">
                    <button class="goal-btn" data-goal="speak">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                        </svg>
                        <span>Научиться говорить</span>
                    </button>
                    <button class="goal-btn" data-goal="read">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                        </svg>
                        <span>Научиться читать</span>
                    </button>
                    <button class="goal-btn" data-goal="write">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                        </svg>
                        <span>Научиться писать</span>
                    </button>
                    <button class="goal-btn" data-goal="travel">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 6.9 8 11.7z"/>
                        </svg>
                        <span>Для путешествий</span>
                    </button>
                    <button class="goal-btn" data-goal="work">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                        </svg>
                        <span>Для работы</span>
                    </button>
                    <button class="goal-btn" data-goal="exam">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/><path d="M8 12l2 2 4-4"/>
                        </svg>
                        <span>Для экзаменов</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="mainApp" class="main-app" style="display:none;">
            <header class="header">
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/><path d="M11 8a3 3 0 0 0-3 3v3"/><path d="M8 11h6"/></svg>
                    <span>Lingua</span>
                </div>
                <nav class="nav" id="mainNav">
                    <button class="nav-btn active" data-tab="dictionary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                        Словарь
                    </button>
                    <button class="nav-btn" data-tab="cards">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                        Карточки
                    </button>
                    <button class="nav-btn" data-tab="grammar">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="4 7 12 3 20 7"/><polyline points="4 12 12 8 20 12"/><polyline points="4 17 12 13 20 17"/></svg>
                        Грамматика
                    </button>
                    <button class="nav-btn" data-tab="quiz">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                        Тест
                    </button>
                </nav>
                <button class="theme-toggle" id="themeToggle" title="Переключить тему">
                    <div class="theme-toggle-thumb">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"/>
                            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                        </svg>
                    </div>
                </button>
                <button class="profile-btn" id="profileBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span id="profileName"></span>
                    <span class="level-badge" id="levelBadge">A1</span>
                </button>
            </header>

            <main class="main">
                <section id="dictionarySection" class="section active">
                    <div class="card">
                        <div class="search-wrapper">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8c8c8c" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                            <input type="text" id="dictionarySearch" class="search-input" placeholder="Поиск слова...">
                            <div class="search-spinner" id="searchSpinner"></div>
                        </div>
                        <div class="search-suggestions" id="searchSuggestions"></div>
                        <div id="dictionaryResult"></div>
                    </div>
                </section>
                <section id="cardsSection" class="section">
                    <div class="card" id="cardsContent"></div>
                </section>
                <section id="grammarSection" class="section">
                    <div class="card" id="grammarContent"></div>
                </section>
                <section id="quizSection" class="section">
                    <div class="card" id="quizContent"></div>
                </section>
            </main>

            <footer>
                <p>Реализовано с помощью сервиса <a href="https://tech.yandex.ru/dictionary/" target="_blank">Яндекс.Словарь</a></p>
            </footer>
        </div>

        <div id="profileScreen" class="profile-screen" style="display:none;">
            <div class="profile-card">
                <button id="closeProfile" class="close-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
                <div class="profile-header">
                    <div class="profile-avatar">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                    <h2 id="profileTitle"></h2>
                    <p id="profileLevel"></p>
                    <div class="score-circle">
                        <svg width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="#f0ede8" stroke-width="6"/><circle id="scoreCircle" cx="50" cy="50" r="45" fill="none" stroke="#1a1a1a" stroke-width="6" stroke-dasharray="283" stroke-dashoffset="283" stroke-linecap="round"/></svg>
                        <span id="scoreText">0</span>
                    </div>
                </div>
                <div class="profile-stats">
                    <div class="stat"><span id="statWords">0</span><span>слов</span></div>
                    <div class="stat"><span id="statCards">0</span><span>карточек</span></div>
                    <div class="stat"><span id="statTests">0</span><span>тестов</span></div>
                </div>
                <div class="profile-section">
                    <h3>Достижения</h3>
                    <div id="achievementsList" class="achievements-list"></div>
                </div>
                <div class="profile-section">
                    <h3>Ошибки</h3>
                    <div id="mistakesList" class="mistakes-list"></div>
                </div>
                <button id="logoutBtn" class="logout-btn">Выйти</button>
            </div>
        </div>
    </div>

    <script src="levels.js"></script>
    <script src="dictionary.js"></script>
    <script src="auth.js"></script>
    <script src="cards.js"></script>
    <script src="grammar.js"></script>
    <script src="quiz.js"></script>
    <script src="profile.js"></script>
    <script src="script.js"></script>
</body>
</html>
