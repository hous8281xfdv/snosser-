<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lingua</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>
                    <path d="M11 8a3 3 0 0 0-3 3v3"/>
                    <path d="M8 11h6"/>
                </svg>
                <span>Lingua</span>
            </div>
            <nav class="nav">
                <button class="nav-btn active" data-tab="translator">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 8l6 6M19 8l-6 6M12 4v16"/>
                    </svg>
                    Перевод
                </button>
                <button class="nav-btn" data-tab="quiz">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                    Тест
                </button>
            </nav>
        </header>

        <main class="main">
            <section id="translatorSection" class="section active">
                <div class="translator-card">
                    <div class="input-section">
                        <div class="language-selector">
                            <span class="lang active" id="sourceLangLabel">Английский</span>
                        </div>
                        <textarea id="sourceText" class="text-input" placeholder="Введите текст для перевода..." rows="5"></textarea>
                        <div class="input-footer">
                            <span class="char-count"><span id="charCount">0</span> / 5000</span>
                            <div class="input-actions">
                                <button id="clearBtn" class="icon-btn" title="Очистить">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8c8c8c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <line x1="18" y1="6" x2="6" y2="18"/>
                                        <line x1="6" y1="6" x2="18" y2="18"/>
                                    </svg>
                                </button>
                                <button id="copySourceBtn" class="icon-btn" title="Копировать">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8c8c8c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="divider">
                        <button id="swapBtn" class="swap-btn" title="Поменять языки">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="17 1 21 5 17 9"/>
                                <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                                <polyline points="7 23 3 19 7 15"/>
                                <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                            </svg>
                        </button>
                    </div>

                    <div class="output-section">
                        <div class="language-selector">
                            <span class="lang active" id="targetLangLabel">Русский</span>
                        </div>
                        <div id="outputText" class="text-output">
                            <span class="placeholder-text">Перевод появится здесь...</span>
                        </div>
                        <div class="output-footer">
                            <span class="translation-info" id="translationInfo"></span>
                            <div class="output-actions">
                                <button id="speakBtn" class="icon-btn" title="Озвучить">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8c8c8c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
                                    </svg>
                                </button>
                                <button id="copyOutputBtn" class="icon-btn" title="Копировать">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8c8c8c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="quizSection" class="section">
                <div class="quiz-card">
                    <div id="quizStart" class="quiz-start">
                        <div class="quiz-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                                <line x1="12" y1="17" x2="12.01" y2="17"/>
                            </svg>
                        </div>
                        <h2 class="quiz-title">Проверка знаний</h2>
                        <p class="quiz-subtitle">Выберите уровень сложности</p>
                        <div class="difficulty-selector">
                            <button class="difficulty-btn easy" data-level="1">
                                <span class="diff-number">1</span>
                                <span class="diff-label">Начальный</span>
                                <span class="diff-desc">Базовые слова и фразы</span>
                            </button>
                            <button class="difficulty-btn medium" data-level="2">
                                <span class="diff-number">2</span>
                                <span class="diff-label">Средний</span>
                                <span class="diff-desc">Распространённая лексика</span>
                            </button>
                            <button class="difficulty-btn hard" data-level="3">
                                <span class="diff-number">3</span>
                                <span class="diff-label">Продвинутый</span>
                                <span class="diff-desc">Сложные выражения</span>
                            </button>
                        </div>
                    </div>

                    <div id="quizActive" class="quiz-active" style="display:none;">
                        <div class="quiz-header">
                            <div class="quiz-progress">
                                <div class="progress-bar">
                                    <div class="progress-fill" id="progressFill"></div>
                                </div>
                                <span class="progress-text" id="progressText">1 / 30</span>
                            </div>
                            <button id="quitQuizBtn" class="icon-btn" title="Выйти">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8c8c8c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="18" y1="6" x2="6" y2="18"/>
                                    <line x1="6" y1="6" x2="18" y2="18"/>
                                </svg>
                            </button>
                        </div>
                        <div class="question-block">
                            <p class="question-text" id="questionText"></p>
                            <div class="options-list" id="optionsList"></div>
                        </div>
                        <div class="quiz-actions">
                            <button id="nextBtn" class="next-btn" disabled>Далее</button>
                        </div>
                    </div>

                    <div id="quizResult" class="quiz-result" style="display:none;">
                        <div class="result-icon" id="resultIcon"></div>
                        <h2 class="result-title" id="resultTitle"></h2>
                        <p class="result-score" id="resultScore"></p>
                        <div class="result-details" id="resultDetails"></div>
                        <button id="retryBtn" class="retry-btn">Пройти заново</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
